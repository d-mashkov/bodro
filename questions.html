<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>(function(){if(localStorage.getItem('bodro-theme')==='light')document.documentElement.setAttribute('data-theme','light');})();</script>
<title>Questions — BODRO</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{overflow-x:hidden;}
:root{--mono:'JetBrains Mono',monospace;--lime:#B5D64E;--ink:#0A0A08;--line:rgba(255,255,255,.08);--muted:rgba(255,255,255,.3);--glass-2:rgba(255,255,255,.06);--sub:rgba(255,255,255,.5);--black:#0A0A08;--white:#fff;}
[data-theme="light"]{--line:rgba(10,10,8,.1);--muted:rgba(10,10,8,.35);--glass-2:rgba(10,10,8,.055);--sub:rgba(10,10,8,.55);--black:#fff;--white:#0A0A08;}
body{font-family:'Archivo',sans-serif;background:var(--black);padding-top:66px;height:100vh;display:flex;flex-direction:column;overflow-x:hidden;transition:background .25s;}
.u-nav{position:fixed;top:0;left:0;right:0;width:100%;max-width:100vw;overflow:hidden;z-index:900;height:66px;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:20px;padding:0 28px;background:rgba(10,10,8,.85);backdrop-filter:blur(28px) saturate(200%);-webkit-backdrop-filter:blur(28px) saturate(200%);border-bottom:1px solid var(--line);transition:background .25s,border-color .25s;}
[data-theme="light"] .u-nav{background:rgba(255,255,255,.85);}
.u-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;}
.u-logo img{height:26px;width:auto;display:block;}
[data-theme="light"] .u-logo img{filter:invert(1);}
.u-wordmark{font-size:16px;font-weight:900;letter-spacing:-.04em;color:var(--white);}
.u-sub{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;white-space:nowrap;}
.u-links{min-width:0;display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;justify-content:flex-start;}
.u-links::-webkit-scrollbar{display:none;}
.u-link{font-size:14.5px;font-weight:600;color:var(--sub);text-decoration:none;padding:10px 17px;border-radius:9px;transition:all .15s;letter-spacing:-.01em;white-space:nowrap;flex-shrink:0;}
.u-link:hover{color:var(--white);background:var(--glass-2);}
.u-link.active{color:var(--ink);background:var(--lime);}
@media(min-width:901px){.u-links{justify-content:center;}}
iframe{flex:1;border:none;width:100%;display:block;}
@media(max-width:900px){.u-nav{padding:0 20px;}.u-sub{display:none;}}

.theme-toggle{position:relative;display:flex;align-items:center;width:54px;height:29px;border-radius:20px;background:var(--glass-2);border:1px solid var(--line);cursor:pointer;flex-shrink:0;padding:0;}
.tt-knob{position:absolute;top:2px;left:2px;width:23px;height:23px;border-radius:50%;background:var(--lime);display:flex;align-items:center;justify-content:center;transition:transform .25s cubic-bezier(.4,0,.2,1);box-shadow:0 2px 6px rgba(0,0,0,.25);}
.tt-knob svg{width:13px;height:13px;stroke:var(--ink);}
[data-theme="light"] .tt-knob{transform:translateX(25px);}
</style>
</head>
<body>
<nav class="u-nav">
  <a href="index.html" class="u-logo">
    <img src="images/icon-mascot.png" alt="BODRO">
    <span class="u-wordmark">BODRO</span>
    <span class="u-sub">Dark Kitchen · Самара</span>
  </a>
  <div class="u-links">
    <a href="BrandBookStrategy.html" class="u-link">BrandBookStrategy</a>
    <a href="roadmap.html" class="u-link">Roadmap</a>
    <a href="menu.html" class="u-link">Menu</a>
    <a href="brand.html" class="u-link">Brand</a>
    <a href="valuechain.html" class="u-link">Value Chain</a>
    <a href="competitor-analysis.html" class="u-link">Competitors</a>
    <a href="nutrition-table.html" class="u-link">Nutrition</a>
    <a href="questions.html" class="u-link active">Questions</a>
  </div>
  <button class="theme-toggle" id="themeToggle" aria-label="Переключить тему" onclick="toggleTheme()">
    <span class="tt-knob">
      <svg id="ttIconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" style="display:none"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.4 1.4M17.66 17.66l1.4 1.4M2 12h2M20 12h2M4.93 19.07l1.4-1.4M17.66 6.34l1.4-1.4"/></svg>
      <svg id="ttIconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    </span>
  </button>
</nav>
<iframe id="questionsFrame" src="DarkKitchen_Service_v4.html?embed=1&page=questions" title="Questions Board"></iframe>
<script>
function updateThemeIcon(){
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  const sun = document.getElementById('ttIconSun'), moon = document.getElementById('ttIconMoon');
  if (sun && moon) { sun.style.display = isLight ? 'block' : 'none'; moon.style.display = isLight ? 'none' : 'block'; }
}
function toggleTheme(){
  const html = document.documentElement;
  const isLight = html.getAttribute('data-theme') === 'light';
  if (isLight) { html.removeAttribute('data-theme'); localStorage.setItem('bodro-theme','dark'); }
  else { html.setAttribute('data-theme','light'); localStorage.setItem('bodro-theme','light'); }
  updateThemeIcon();
  const frame = document.getElementById('questionsFrame');
  if (frame && frame.contentWindow) frame.contentWindow.postMessage({bodroTheme: isLight ? 'dark' : 'light'}, '*');
}
updateThemeIcon();
</script>
</body>
</html>
