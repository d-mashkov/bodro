<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="site-nav.css">
<script src="site-nav.js" defer></script>
<script>(function(){if(localStorage.getItem('bodro-theme')==='light')document.documentElement.setAttribute('data-theme','light');})();</script>
<title>Value Chain — BODRO</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{overflow-x:hidden;}
:root{
  --black:#0A0A08;--black-2:#111110;--sand:#F2EDE5;--lime:#B5D64E;--white:#FFFFFF;
  --line:rgba(255,255,255,.08);--sub:rgba(255,255,255,.5);--muted:rgba(255,255,255,.32);
  --glass:rgba(255,255,255,.035);--glass-2:rgba(255,255,255,.06);
  --red:#EF4444;--green:#22C55E;--blue:#3B82F6;--amber:#F59E0B;
  --gs:0 24px 60px rgba(0,0,0,.4);--mono:'JetBrains Mono',monospace;--ink:#0A0A08;
}
body{font-family:'Archivo',sans-serif;background:var(--black);color:var(--white);padding-top:58px;overflow-x:hidden;transition:background .25s,color .25s;}
[data-theme="light"]{--black:#FFFFFF;--black-2:#F5F3EF;--bg:#FFFFFF;--white:#0A0A08;--line:rgba(10,10,8,.1);--sub:rgba(10,10,8,.55);--muted:rgba(10,10,8,.4);--glass:rgba(10,10,8,.03);--glass-2:rgba(10,10,8,.055);--gb:rgba(10,10,8,.03);--gs:0 18px 40px rgba(10,10,8,.08);--bodro:#0A0A08;}
[data-theme="light"] body{background:#FAFAF8;}
[data-theme="light"] .card,
[data-theme="light"] .formula-card,
[data-theme="light"] .kpi-stat,
[data-theme="light"] .insight{background:#fff;border-color:rgba(10,10,8,.11);box-shadow:0 10px 28px rgba(10,10,8,.055);}
[data-theme="light"] .footnote,
[data-theme="light"] .bench,
[data-theme="light"] .param-row.hl,
[data-theme="light"] .sens-row{background:rgba(10,10,8,.025);}
[data-theme="light"] .control input,
[data-theme="light"] .num-input,
[data-theme="light"] .dish-table .rrp-inp,
[data-theme="light"] .dish-table .qty-inp,
[data-theme="light"] .lock-inp{background:#fff;border-color:rgba(10,10,8,.12);}
.u-nav{transition:background .25s,border-color .25s;}
[data-theme="light"] .u-nav{background:rgba(255,255,255,.85);}
.theme-toggle{position:relative;display:flex;align-items:center;width:50px;height:27px;border-radius:20px;background:var(--glass-2);border:1px solid var(--line);cursor:pointer;flex-shrink:0;padding:0;}
.tt-knob{position:absolute;top:2px;left:2px;width:21px;height:21px;border-radius:50%;background:var(--lime);display:flex;align-items:center;justify-content:center;transition:transform .25s cubic-bezier(.4,0,.2,1);box-shadow:0 2px 6px rgba(0,0,0,.25);}
.tt-knob svg{width:12px;height:12px;stroke:var(--ink);}
[data-theme="light"] .tt-knob{transform:translateX(23px);}
[data-theme="light"] .u-logo img{filter:invert(1);}

/* NAV */
.u-nav{position:fixed;top:0;left:0;right:0;width:100%;max-width:100vw;overflow:hidden;z-index:900;height:58px;display:flex;align-items:center;gap:20px;padding:0 28px;background:rgba(10,10,8,.85);backdrop-filter:blur(28px) saturate(200%);-webkit-backdrop-filter:blur(28px) saturate(200%);border-bottom:1px solid var(--line);}
.u-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;}
.u-logo img{height:24px;width:auto;display:block;}
.u-wordmark{font-size:15px;font-weight:900;letter-spacing:-.04em;color:var(--white);}
.u-sub{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;white-space:nowrap;}
.u-links{flex:1;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;justify-content:flex-start;min-width:0;}
.u-links::-webkit-scrollbar{display:none;}
.u-link{font-size:13px;font-weight:600;color:var(--sub);text-decoration:none;padding:7px 13px;border-radius:7px;transition:all .15s;letter-spacing:-.01em;white-space:nowrap;flex-shrink:0;}
.u-link:hover{color:var(--white);background:var(--glass-2);}
.u-link.active{color:var(--ink);background:var(--lime);}
@media(min-width:901px){.u-links{justify-content:center;}}

/* PAGE HEAD */
.page-head{background:var(--black-2);color:var(--white);padding:52px 60px 44px;border-bottom:1px solid var(--line);}
.page-eyebrow{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.ey-dot{width:6px;height:6px;border-radius:50%;background:var(--lime);flex-shrink:0;}
.page-title{font-size:clamp(30px,3.6vw,46px);font-weight:900;letter-spacing:-.04em;margin-bottom:8px;}
.page-desc{font-size:14px;color:var(--sub);line-height:1.65;max-width:640px;}

.wrap{padding:28px 40px 90px;max-width:1680px;margin:0 auto;}

/* CARDS */
.card{background:var(--glass);border:1px solid var(--line);border-radius:10px;box-shadow:var(--gs);}
.card-p{padding:20px 22px;}
.sec-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.sec-title{font-size:18px;font-weight:900;letter-spacing:-.01em;margin-bottom:14px;color:var(--white);line-height:1.15;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
.g6{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;}
.mb20{margin-bottom:14px;}
.mono{font-family:var(--mono);}

/* PARAM ROWS */
.param-row{display:grid;grid-template-columns:minmax(180px,1fr) auto;align-items:center;gap:16px;padding:10px 0;border-bottom:1px solid var(--line);}
.param-row:last-child{border-bottom:none;}
.param-row.hl{background:var(--glass-2);border-radius:8px;padding:11px 12px;border-bottom:none;}
.param-name{font-size:13px;font-weight:600;color:var(--white);}
.param-name.strong{font-weight:800;}
.param-hint{font-size:11px;color:var(--muted);display:block;}
.param-val{font-family:var(--mono);font-weight:700;font-size:14px;white-space:nowrap;color:var(--white);}
.sl-wrap{display:grid;grid-template-columns:minmax(150px,1fr) 56px;align-items:center;gap:10px;min-width:230px;}
.sl-wrap input[type=range]{width:100%;accent-color:var(--lime);}
.sl-val{font-family:var(--mono);font-size:13px;font-weight:700;min-width:52px;text-align:right;color:var(--lime);}
input[type=range]{-webkit-appearance:none;height:4px;background:rgba(255,255,255,.14);border-radius:999px;outline:none;cursor:pointer;}
[data-theme="light"] input[type=range]{background:rgba(10,10,8,.16);}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:17px;height:17px;background:var(--black);border:3px solid var(--lime);border-radius:50%;cursor:pointer;box-shadow:0 1px 5px rgba(0,0,0,.22);}
[data-theme="light"] input[type=range]::-webkit-slider-thumb{background:#fff;border-color:var(--lime);}
.num-input{width:110px;height:38px;padding:7px 10px;border:1.5px solid var(--line);border-radius:8px;font-family:var(--mono);font-size:13px;font-weight:700;text-align:right;background:rgba(255,255,255,.04);color:var(--white);outline:none;transition:border-color .15s;}
.num-input:focus{border-color:var(--lime);}
.fc-tax{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--sub);min-width:64px;text-align:right;}
.input-with-note{display:grid;grid-template-columns:110px 70px;gap:8px;align-items:center;justify-content:end;}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:2px;}

/* DISH TABLE */
.dish-table{width:100%;border-collapse:separate;border-spacing:0;min-width:1280px;}
.dish-table th{position:sticky;top:58px;z-index:2;background:var(--black);font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:10px 8px;text-align:right;border-bottom:1.5px solid var(--line);white-space:nowrap;}
[data-theme="light"] .dish-table th{background:#FAFAF8;}
.dish-table th:first-child{text-align:left;}
.dish-table td{padding:8px;border-bottom:1px solid var(--line);font-size:12.5px;text-align:right;white-space:nowrap;color:var(--white);}
.dish-table td:first-child{text-align:left;font-weight:600;white-space:normal;}
.dish-table .cat-chip{display:inline-block;font-family:var(--mono);font-size:8.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:rgba(255,255,255,.05);padding:2px 8px;border-radius:999px;margin-left:8px;}
.dish-table .m{font-family:var(--mono);font-weight:700;}
.dish-table .rrp-inp{width:76px;height:32px;padding:5px 8px;border:1.5px solid var(--line);border-radius:7px;font-family:var(--mono);font-size:13px;font-weight:700;text-align:right;background:rgba(255,255,255,.04);color:var(--white);outline:none;}
.dish-table .rrp-inp:focus{border-color:var(--lime);}
.dish-table .rrp-inp.ovr{border-color:var(--lime);background:rgba(181,214,78,.08);}
.dish-table .qty-inp{width:58px;height:32px;padding:5px 8px;border:1.5px solid var(--line);border-radius:7px;font-family:var(--mono);font-size:13px;font-weight:700;text-align:right;background:rgba(255,255,255,.04);color:var(--white);outline:none;}
.dish-table .qty-inp:focus{border-color:var(--lime);}
.dish-table .price-rec{color:var(--lime);}
.dish-table .risk-tag{display:inline-flex;align-items:center;justify-content:center;min-width:76px;padding:3px 8px;border-radius:999px;font-family:var(--mono);font-size:9px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;}
.risk-ok{background:rgba(34,197,94,.12);color:var(--green);}
.risk-mid{background:rgba(245,158,11,.12);color:var(--amber);}
.risk-bad{background:rgba(239,68,68,.12);color:var(--red);}
.dish-table tr.group-row td{background:var(--black-2);color:var(--lime);font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:8px 10px;text-align:left;border-radius:0;}
.dish-table tr.total-row td{background:rgba(255,255,255,.05);font-weight:800;padding:11px 8px;}
.fc-bad{color:var(--red);}
.fc-ok{color:var(--green);}
.fc-mid{color:var(--amber);}

/* KPI */
.kpi-stat{text-align:center;padding:16px 14px;background:var(--glass);border:1px solid var(--line);border-radius:10px;box-shadow:var(--gs);min-height:112px;display:flex;flex-direction:column;justify-content:center;}
.stat-label-sm{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px;font-family:var(--mono);}
.kpi-num{font-size:28px;font-weight:900;letter-spacing:-.02em;line-height:1;color:var(--white);}
.kpi-ok{color:var(--green);}
.kpi-bad{color:var(--red);}
.stat-note{font-size:11px;color:var(--sub);margin-top:6px;line-height:1.4;}

/* CONSTRUCTOR */
.formula-strip{display:grid;grid-template-columns:minmax(360px,1fr) minmax(360px,1.05fr) minmax(420px,1.2fr);gap:14px;margin-bottom:14px;align-items:start;}
.formula-card{background:var(--black-2);border:1px solid var(--line);border-radius:10px;padding:18px 20px;box-shadow:var(--gs);}
.formula-main{font-size:26px;font-weight:900;letter-spacing:-.02em;color:var(--white);line-height:1.05;margin:8px 0;white-space:nowrap;}
.formula-main span{color:var(--lime);}
.formula-caption{font-size:12px;line-height:1.55;color:var(--sub);}
.bench-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:14px;}
.bench{min-height:68px;padding:10px;border-radius:8px;border:1px solid var(--line);background:var(--glass);display:flex;flex-direction:column;justify-content:center;}
.bench b{display:block;font-family:var(--mono);font-size:15px;margin-bottom:3px;}
.bench small{font-size:10px;color:var(--muted);line-height:1.3;}
.control-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(132px,1fr));gap:12px;align-items:end;}
.control{padding:0;border-bottom:none;min-width:0;}
.control label{display:flex;align-items:flex-end;min-height:28px;font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-family:var(--mono);line-height:1.25;}
.control input{width:100%;height:40px;padding:9px 10px;border:1.5px solid var(--line);border-radius:8px;background:rgba(255,255,255,.04);color:var(--white);font-family:var(--mono);font-size:13px;font-weight:700;outline:none;}
.control input:focus{border-color:var(--lime);}
.scale-meter{height:12px;background:var(--glass-2);border-radius:999px;overflow:hidden;margin-top:9px;}
.scale-meter > div{height:100%;background:var(--lime);border-radius:999px;transition:width .25s;}
.insight-list{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.insight{background:var(--glass);border:1px solid var(--line);border-radius:10px;padding:16px 18px;min-height:116px;}
.insight .label{font-family:var(--mono);font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.insight .value{font-size:22px;font-weight:900;letter-spacing:-.03em;color:var(--white);line-height:1;}
.insight .hint{font-size:11px;line-height:1.45;color:var(--sub);margin-top:6px;}

/* P&L */
.pl-row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-radius:8px;font-size:13px;}
.pl-row:nth-child(odd){background:rgba(255,255,255,.025);}
.pl-row.pl-total{background:rgba(255,255,255,.06);font-weight:800;font-size:14px;border-radius:10px;margin-top:4px;padding:13px 14px;}
.pl-name{color:var(--sub);font-weight:500;}
.pl-name.strong{color:var(--white);font-weight:700;}
.pl-amount{font-family:var(--mono);font-weight:700;color:var(--white);}

/* COST STRUCTURE */
.cs-row{display:grid;grid-template-columns:190px 1fr 90px 70px;gap:12px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);}
.cs-row:last-child{border-bottom:none;}
.cs-name{font-size:12.5px;font-weight:600;color:var(--white);}
.cs-bar-outer{height:16px;background:rgba(255,255,255,.05);border-radius:5px;overflow:hidden;}
.cs-bar{height:100%;border-radius:5px;transition:width .4s;}
.cs-amt{font-family:var(--mono);font-size:12px;font-weight:700;text-align:right;color:var(--white);}
.cs-pct{font-family:var(--mono);font-size:12px;font-weight:700;text-align:right;color:var(--sub);}

/* SENSITIVITY */
.sens-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:10px;margin-bottom:6px;background:var(--glass);border:1px solid var(--line);}
.sens-name{font-size:13px;font-weight:600;color:var(--white);}
.sens-name small{display:block;font-size:11px;color:var(--muted);font-weight:400;}
.sens-val{font-family:var(--mono);font-size:14px;font-weight:800;}

/* SCENARIOS */
.sc-table{width:100%;border-collapse:collapse;}
.sc-table th{font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:9px 10px;text-align:right;border-bottom:1.5px solid var(--line);}
.sc-table th:first-child{text-align:left;}
.sc-table td{padding:10px;border-bottom:1px solid var(--line);font-size:13px;text-align:right;font-family:var(--mono);font-weight:600;color:var(--white);}
.sc-table td:first-child{text-align:left;font-family:'Archivo';font-weight:700;}
.sc-table tr.now td{background:rgba(181,214,78,.1);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 20px;border-radius:999px;font-size:12.5px;font-weight:700;cursor:pointer;border:none;transition:all .15s;font-family:inherit;}
.btn-black{background:var(--lime);color:var(--black);}
.btn-black:hover{background:#c5e56a;}
.btn-ghost{background:transparent;color:var(--white);border:1.5px solid var(--line);}
.btn-ghost:hover{border-color:var(--white);}

.footnote{font-size:11px;color:var(--muted);line-height:1.55;margin-top:12px;padding:10px 12px;background:var(--glass);border-radius:8px;border-left:2px solid var(--line);}
.footnote strong{color:var(--sub);}

/* LOCK */
.lock-screen{min-height:calc(100vh - 58px);display:flex;align-items:center;justify-content:center;padding:24px;}
.lock-card{background:var(--black-2);border:1px solid var(--line);border-radius:18px;padding:40px;width:100%;max-width:380px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.5);}
.lock-icon{width:48px;height:48px;background:var(--lime);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
.lock-title{font-size:20px;font-weight:900;letter-spacing:-.03em;margin-bottom:8px;color:var(--white);}
.lock-sub{font-size:13px;color:var(--muted);margin-bottom:24px;}
.lock-inp{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;font-size:16px;text-align:center;letter-spacing:.15em;outline:none;font-family:var(--mono);margin-bottom:8px;background:rgba(255,255,255,.04);color:var(--white);}
.lock-inp:focus{border-color:var(--lime);}
.lock-err{font-size:12px;color:var(--red);min-height:18px;margin-bottom:12px;}

@media(max-width:1280px){.formula-strip{grid-template-columns:1fr 1fr;}.formula-strip .formula-card:first-child{grid-column:1/-1;}.formula-main{white-space:normal;}}
@media(max-width:1100px){.g2,.g3,.formula-strip{grid-template-columns:1fr;}.formula-strip .formula-card:first-child{grid-column:auto;}.g4,.g5,.g6,.insight-list{grid-template-columns:1fr 1fr;}.control-grid{grid-template-columns:1fr 1fr;}.wrap{padding:26px 20px 80px;}.page-head{padding:44px 20px 36px;}.u-nav{padding:0 20px;}.u-sub{display:none;}.cs-row{grid-template-columns:130px 1fr 80px 56px;}.table-scroll{overflow-x:auto;}}
@media(max-width:640px){.g4,.g5,.g6,.insight-list,.control-grid,.bench-grid{grid-template-columns:1fr;}.formula-main{font-size:24px;}.param-row{grid-template-columns:1fr;}.sl-wrap{min-width:0;}.input-with-note{grid-template-columns:1fr;}}
.table-scroll{overflow-x:auto;border:1px solid var(--line);border-radius:8px;}
.table-scroll .dish-table,.table-scroll .sc-table{border-radius:8px;overflow:hidden;}
</style>
</head>

<!-- LOCK -->
<div class="lock-screen" id="lock">
  <div class="lock-card">
    <div class="lock-icon">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="5" y="9" width="10" height="8" rx="2" fill="white"/><path d="M7 9V6.5a3 3 0 016 0V9" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg>
    </div>

const _VC_HASH = '65dad6e7090344b1f7875b9ce52bc92220438350338fe40651fe82ad9f8f6a3e';

async function _sha256(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function checkPass(){
  const inp=document.getElementById('vc-pass');
  _sha256(inp.value).then(h=>{
    if(h===_VC_HASH){ sessionStorage.setItem('_vcu','ok'); unlock(); }
    else{
      document.getElementById('vc-err').textContent='Неверный пароль';
      inp.style.borderColor='var(--red)'; inp.select();
      setTimeout(()=>{ inp.style.borderColor=''; document.getElementById('vc-err').textContent=''; },1400);
    }
  });
}
document.getElementById('vc-pass').addEventListener('keydown',e=>{ if(e.key==='Enter') checkPass(); });

const MARKET_DEFAULT={population:1173000,segmentPct:9,ordersMonth:4,avgCheck:320,capturePct:1.5};

const LS_KEY='bodro_vc_v2';
let S=null; // state

function clamp(n,min,max){ return Math.min(max,Math.max(min,Number.isFinite(+n)?+n:min)); }
function normalizeChannelShares(state, changed){
  state.yaShare=clamp(state.yaShare,0,100);
  state.dtcShare=clamp(state.dtcShare,0,80);
  const total=state.yaShare+state.dtcShare;
  if(total<=100) return;
  if(changed==='yaShare') state.dtcShare=Math.max(0,100-state.yaShare);
  else if(changed==='dtcShare') state.yaShare=Math.max(0,100-state.dtcShare);
  else {
    state.yaShare=Math.round(state.yaShare/total*100);
    state.dtcShare=100-state.yaShare;
  }
}
function setChannelShare(key,value){
  S[key]=+value||0;
  normalizeChannelShares(S,key);
  calc();
}

function defaultState(){
  return {
    pkg:15, pkgDrink:10,

    fix:{rent:80000,util:25000,mkt:20000,other:15000},
  };
}
function loadState(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw) return defaultState();
    const s={...defaultState(),...JSON.parse(raw)};

    s.fix={...defaultState().fix,...(s.fix||{})};
    s.qty={...defaultState().qty,...(s.qty||{})};
    s.market={...MARKET_DEFAULT,...(s.market||{})};
    s.capacity=clamp(s.capacity,1,5000);
    s.targetFc=clamp(s.targetFc,15,60);
    s.targetProfit=clamp(s.targetProfit,-1000000,5000000);
    normalizeChannelShares(s);
    return s;
  }catch(e){ return defaultState(); }
}

/* ══════════════ MODEL ══════════════ */
function isDrink(d){ return d.cat==='Напиток'||d.cat==='Добавка'; }
function cogsOf(d){ return d.fc + (isDrink(d)?S.pkgDrink:S.pkg); }
function autoPrice(d){
  const c=cogsOf(d);
  const raw=c*(1+(S.markup[d.cat]||200)/100);
  const r=Math.max(Math.ceil((c+1)/10)*10, Math.round(raw/10)*10); // честное округление до 10 ₽
  return r;
}
function targetPriceForCogs(c, targetFc=S.targetFc){ return Math.ceil((c/(targetFc/100))/10)*10; }
function priceOf(d){ return S.over[d.id]!=null ? S.over[d.id] : autoPrice(d); }

// Полная модель. opts: {qtyScale, yaComm, fotScale, rentScale, fcScale, extraQty}
function computeModel(opts={}){
  const qs=opts.qtyScale??1;
  const yaComm=(opts.yaComm??S.ya)/100;
  normalizeChannelShares(S);
  const dtcDisc=S.dtc/100, yaShare=S.yaShare/100, dtcShare=S.dtcShare/100;
  const b2bShare=Math.max(0,1-yaShare-dtcShare);
  const wtdComm=yaShare*yaComm+dtcShare*dtcDisc+b2bShare*0.10;
  const wf=S.wkend/100;
  const fcScale=opts.fcScale??1;
  let dayPortions=0,dayRev=0,dayCogs=0;
  DISHES.forEach(d=>{
    let q=(S.qty[d.id]||0)*qs;
    dayPortions+=q;
    dayRev+=q*priceOf(d);
    dayCogs+=q*(d.fc*fcScale+(isDrink(d)?S.pkgDrink:S.pkg));
  });
  if(opts.extraQty){ // равномерная добавка порций по среднему чеку
    const avgP=dayPortions>0?dayRev/dayPortions:0, avgC=dayPortions>0?dayCogs/dayPortions:0;
    dayPortions+=opts.extraQty; dayRev+=opts.extraQty*avgP; dayCogs+=opts.extraQty*avgC;
  }
  const monthFactor=22+8*wf;
  const monthPortions=Math.round(dayPortions*monthFactor);
  const revGross=dayRev*monthFactor;
  const commLoss=revGross*wtdComm;
  const revNet=revGross-commLoss;
  const cogsTotal=dayCogs*monthFactor;
  const gp=revNet-cogsTotal;
  const fot=(S.fot.manager+S.fot.cook1+S.fot.cook2+S.fot.acc)*1.3*(opts.fotScale??1);
  const rent=S.fix.rent*(opts.rentScale??1);
  const fixedOther=rent+S.fix.util+S.fix.mkt+S.fix.other;
  const allFixed=fot+fixedOther;
  const ebitda=gp-allFixed;
  const avgCheck=dayPortions>0?dayRev/dayPortions:0;
  const avgCogs=dayPortions>0?dayCogs/dayPortions:0;
  const netPerPortion=avgCheck*(1-wtdComm)-avgCogs;
  const beMonthly=netPerPortion>0?allFixed/netPerPortion:0;
  const beDaily=beMonthly>0?Math.ceil(beMonthly/monthFactor):0;
  const targetDaily=netPerPortion>0?Math.ceil((allFixed+(S.targetProfit||0))/netPerPortion/monthFactor):0;
  return {dayPortions,dayRev,avgCheck,avgCogs,monthPortions,revGross,commLoss,revNet,cogsTotal,gp,fot,rent,fixedOther,allFixed,ebitda,wtdComm,beDaily,targetDaily,netPerPortion,
    gpPct:revNet>0?gp/revNet*100:0, ebitdaPct:revNet>0?ebitda/revNet*100:0,
    foodCostPct:revGross>0?cogsTotal/revGross*100:0, cogsToNetPct:revNet>0?cogsTotal/revNet*100:0};
}
function marketModel(){
  const m=S.market||MARKET_DEFAULT;
  const buyers=(+m.population||0)*(+m.segmentPct||0)/100;
  const portionsMonth=buyers*(+m.ordersMonth||0);
  const portionsDay=portionsMonth/30;
  const revMonth=portionsMonth*(+m.avgCheck||0);
  const captureDay=portionsDay*(+m.capturePct||0)/100;
  const captureMonth=captureDay*30*(+m.avgCheck||0);
  return {buyers,portionsMonth,portionsDay,revMonth,captureDay,captureMonth};
}
function setMarket(key,value){ S.market[key]=+value||0; calc(); }
function setNumber(key,value,min,max){ S[key]=clamp(+value||0,min,max); calc(); }

      </div>
      <div class="param-row hl">

      </div>
      <div class="param-row hl">
        <div><span class="param-name strong">Средневзвешенная комиссия</span></div>
        <span class="param-val" id="lbl_wtdcomm">—</span>
      </div>
    </div>

    <div class="card card-p">
      <div class="sec-label">Постоянные расходы</div>
      <div class="sec-title">ФОТ (×1.3 с налогами) и операционка</div>
      <div class="param-row">
        <div><span class="param-name">Управляющий</span></div>
        <div class="input-with-note"><input type="number" class="num-input" value="${S.fot.manager}" step="5000" oninput="S.fot.manager=+this.value||0;calc()"><span class="fc-tax" id="tax_manager">—</span></div>
      </div>
      <div class="param-row">
        <div><span class="param-name">Повар 1</span></div>
        <div class="input-with-note"><input type="number" class="num-input" value="${S.fot.cook1}" step="5000" oninput="S.fot.cook1=+this.value||0;calc()"><span class="fc-tax" id="tax_cook1">—</span></div>
      </div>
      <div class="param-row">
        <div><span class="param-name">Повар 2</span></div>
        <div class="input-with-note"><input type="number" class="num-input" value="${S.fot.cook2}" step="5000" oninput="S.fot.cook2=+this.value||0;calc()"><span class="fc-tax" id="tax_cook2">—</span></div>
      </div>
      <div class="param-row">
        <div><span class="param-name">Бухгалтер (аутсорс)</span></div>
        <div class="input-with-note"><input type="number" class="num-input" value="${S.fot.acc}" step="1000" oninput="S.fot.acc=+this.value||0;calc()"><span class="fc-tax" id="tax_acc">—</span></div>
      </div>
      <div class="param-row">
        <div><span class="param-name">Аренда помещения</span><span class="param-hint">60–80 м²</span></div>
        <input type="number" class="num-input" value="${S.fix.rent}" step="5000" oninput="S.fix.rent=+this.value||0;calc()">
      </div>
      <div class="param-row">
        <div><span class="param-name">Коммуналка</span><span class="param-hint">свет, вода, газ</span></div>
        <input type="number" class="num-input" value="${S.fix.util}" step="5000" oninput="S.fix.util=+this.value||0;calc()">
      </div>
      <div class="param-row">
        <div><span class="param-name">Маркетинг</span></div>
        <input type="number" class="num-input" value="${S.fix.mkt}" step="5000" oninput="S.fix.mkt=+this.value||0;calc()">
      </div>
      <div class="param-row">
        <div><span class="param-name">Прочие расходы</span></div>
        <input type="number" class="num-input" value="${S.fix.other}" step="5000" oninput="S.fix.other=+this.value||0;calc()">
      </div>
      <div class="param-row hl">
        <div><span class="param-name strong">Постоянные расходы итого</span></div>
        <span class="param-val" id="lbl_fixed">—</span>
      </div>
    </div>
  </div>

  <!-- P&L + СТРУКТУРА ЗАТРАТ -->
  <div class="g2 mb20">
    <div class="card card-p">
      <div class="sec-label">Доходы и расходы · месяц</div>
      <div class="sec-title">P&L Waterfall</div>
      <div id="pl_waterfall"></div>
    </div>
    <div class="card card-p">
      <div class="sec-label">Куда уходит выручка</div>
      <div class="sec-title">Структура затрат · % от выручки gross</div>
      <div id="cost_structure"></div>
      <div class="footnote" id="cs_insight"></div>
    </div>
  </div>

  <!-- ЧУВСТВИТЕЛЬНОСТЬ -->
  <div class="card card-p mb20">
    <div class="sec-label">На что давить · что резать</div>
    <div class="sec-title">Чувствительность EBITDA к рычагам</div>
    <div class="g2" style="gap:10px;" id="sens_grid"></div>
    <div class="footnote">Каждая строка — изменение <strong>одного</strong> параметра при прочих равных. Отсортировано по влиянию на EBITDA/мес: верхние рычаги — приоритет для менеджмента.</div>
  </div>

  <!-- СЦЕНАРИИ -->
  <div class="card card-p mb20">
    <div class="sec-label">Сценарный анализ</div>
    <div class="sec-title">Что если изменить объём продаж?</div>
    <div class="table-scroll"><table class="sc-table" id="sc_table"></table></div>
    <div class="footnote">Микс блюд сохраняется как в прогнозе, масштабируется общий объём. Строка с подсветкой — текущий план.</div>
  </div>

  <!-- ВЫРУЧКА ПО КАТЕГОРИЯМ -->
  <div class="card card-p">
    <div class="sec-label">Разрез по категориям</div>
    <div class="sec-title">Выручка и маржа по группам меню · будний день</div>
    <div class="table-scroll"><table class="sc-table" id="cat_table"></table></div>
  </div>

</div>`;
  renderMarkupRows();
  renderDishTable();
}

function renderMarkupRows(){
  document.getElementById('markup_rows').innerHTML=CAT_LIST.map(c=>`
    <div class="param-row">
      <div><span class="param-name">${c==='Добавка'?'Добавки':c==='Напиток'?'Напитки':c==='Второе'?'Вторые блюда':c==='Суп'?'Супы':c==='Салат'?'Салаты':c==='Гарнир'?'Гарниры':'Десерты'}</span></div>
      <div class="sl-wrap">
        <input type="range" min="50" max="500" step="10" value="${S.markup[c]}" oninput="S.markup['${c}']=+this.value;onMarkupChange();">
        <span class="sl-val" id="mk_${c}">+${S.markup[c]}%</span>
      </div>
    </div>`).join('');
}

function dishRow(d){
  const c=cogsOf(d), p=priceOf(d), ovr=S.over[d.id]!=null;
  return `<tr>
    <td>${d.name}<span class="cat-chip">${d.cat}</span></td>
    <td class="m">${d.fc} ₽</td>
    <td class="m" id="cogs_${d.id}">${c} ₽</td>
    <td class="m price-rec" id="rec_${d.id}">—</td>
    <td><input type="number" class="rrp-inp ${ovr?'ovr':''}" id="rrp_${d.id}" value="${p}" min="1" step="1"
      oninput="S.over['${d.id}']=Math.max(1,+this.value||1);this.classList.add('ovr');calc()"></td>
    <td class="m" id="mg_${d.id}">—</td>
    <td class="m" id="fcp_${d.id}">—</td>
    <td class="m" id="gm_${d.id}">—</td>
    <td class="m" id="net_${d.id}">—</td>
    <td id="risk_${d.id}">—</td>
    <td><input type="number" class="qty-inp" id="qty_${d.id}" value="${S.qty[d.id]||0}" min="0" step="1"
      oninput="S.qty['${d.id}']=Math.max(0,+this.value||0);calc()"></td>
    <td class="m" id="rev_${d.id}">—</td>
  </tr>`;
}

function renderDishTable(){
  const head=`<thead><tr>
    <th>Позиция</th><th>Себес</th><th>COGS</th><th>РРЦ target</th><th>РРЦ ₽</th><th>Маржа ₽</th><th>FC %</th><th>GM %</th><th>Вклад</th><th>Решение</th><th>Продажи/день</th><th>Выручка/день</th>
  </tr></thead>`;
  const dishes=DISHES.filter(d=>DISH_CATS.includes(d.cat));
  const drinks=DISHES.filter(d=>d.cat==='Напиток');
  const extras=DISHES.filter(d=>d.cat==='Добавка');
  document.getElementById('dish_table').innerHTML=head+`<tbody>
    <tr class="group-row"><td colspan="12">Блюда · ${dishes.length} позиций</td></tr>
    ${dishes.map(dishRow).join('')}
    <tr class="group-row"><td colspan="12">Напитки · ${drinks.length} позиции</td></tr>
    ${drinks.map(dishRow).join('')}
    <tr class="group-row"><td colspan="12">Добавки · ${extras.length} позиция</td></tr>
    ${extras.map(dishRow).join('')}
    <tr class="total-row">
      <td>Итого · будний день</td><td></td><td></td>
      <td class="m" id="tot_rec">—</td>
      <td class="m" id="tot_avgcheck">—</td>
      <td class="m" id="tot_margin">—</td>
      <td class="m" id="tot_fcp">—</td>
      <td class="m" id="tot_gm">—</td>
      <td class="m" id="tot_net">—</td>
      <td></td>
      <td class="m" id="tot_qty">—</td>
      <td class="m" id="tot_rev">—</td>
    </tr>
  </tbody>`;
}

function onMarkupChange(){
  CAT_LIST.forEach(c=>{ const el=document.getElementById('mk_'+c); if(el) el.textContent='+'+S.markup[c]+'%'; });
  // обновить авто-цены для непереопределённых позиций
  DISHES.forEach(d=>{
    if(S.over[d.id]==null){
      const inp=document.getElementById('rrp_'+d.id);
      if(inp){ inp.value=autoPrice(d); inp.classList.remove('ovr'); }
    }
  });
  calc();
}

function resetPrices(){
  S.over={};
  DISHES.forEach(d=>{
    const inp=document.getElementById('rrp_'+d.id);
    if(inp){ inp.value=autoPrice(d); inp.classList.remove('ovr'); }
  });
  calc();
}

/* ══════════════ CALC ══════════════ */
function calc(){
  normalizeChannelShares(S);
  const M=computeModel();
  const MM=marketModel();

  // labels
  const set=(id,txt)=>{ const el=document.getElementById(id); if(el) el.textContent=txt; };
  set('lbl_pkg',S.pkg+' ₽'); set('lbl_pkgd',S.pkgDrink+' ₽'); set('lbl_wkend',S.wkend+'%');
  set('lbl_ya',S.ya+'%'); set('lbl_yash',S.yaShare+'%'); set('lbl_dtc',S.dtc+'%'); set('lbl_dtcsh',S.dtcShare+'%');
  const slYash=document.getElementById('sl_yash'), slDtcsh=document.getElementById('sl_dtcsh');
  if(slYash) slYash.value=S.yaShare;
  if(slDtcsh) slDtcsh.value=S.dtcShare;
  const b2b=Math.max(0,100-S.yaShare-S.dtcShare);
  set('lbl_b2b',b2b+'%');
  set('lbl_wtdcomm',(M.wtdComm*100).toFixed(1)+'%');
  set('res_day_portions',Math.round(M.dayPortions));
  set('res_month_portions',M.monthPortions.toLocaleString('ru'));
  set('res_month_note',`${Math.round(M.dayPortions)}×22 будних + ${Math.round(M.dayPortions*S.wkend/100)}×8 выходных`);
  ['manager','cook1','cook2','acc'].forEach(k=>set('tax_'+k,fmt(S.fot[k]*1.3)));
  set('lbl_fixed',fmt(M.allFixed));

  // per-dish computed cells
  let recSum=0, netDay=0;
  DISHES.forEach(d=>{
    const c=cogsOf(d), p=priceOf(d), q=S.qty[d.id]||0;
    const rec=targetPriceForCogs(c), mg=p-c, fcp=p>0?c/p*100:0, gm=p>0?mg/p*100:0;
    const net=p*(1-M.wtdComm)-c;
    recSum+=rec*q; netDay+=net*q;
    set('cogs_'+d.id,c+' ₽');
    set('rec_'+d.id,rec+' ₽');
    const mgEl=document.getElementById('mg_'+d.id);
    if(mgEl){ mgEl.textContent='+'+Math.round(mg)+' ₽'; mgEl.style.color=mg>0?'var(--green)':'var(--red)'; }
    const fcEl=document.getElementById('fcp_'+d.id);
    if(fcEl){ fcEl.textContent=fcp.toFixed(0)+'%'; fcEl.className='m '+(fcp<30?'fc-ok':fcp<=35?'fc-mid':'fc-bad'); }
    const gmEl=document.getElementById('gm_'+d.id);
    if(gmEl){ gmEl.textContent=gm.toFixed(0)+'%'; gmEl.style.color=gm>=65?'var(--green)':gm>=55?'var(--amber)':'var(--red)'; }
    const netEl=document.getElementById('net_'+d.id);
    if(netEl){ netEl.textContent=(net>=0?'+':'')+Math.round(net)+' ₽'; netEl.style.color=net>0?'var(--green)':'var(--red)'; }
    const riskEl=document.getElementById('risk_'+d.id);
    if(riskEl){
      const cls=fcp<=S.targetFc?'risk-ok':fcp<=35?'risk-mid':'risk-bad';
      const txt=fcp<=S.targetFc?'ОК':fcp<=35?'следить':fcp<=40?'поднять':'стоп';
      riskEl.innerHTML=`<span class="risk-tag ${cls}">${txt}</span>`;
    }
    set('rev_'+d.id,fmt(p*q));
  });
  set('tot_qty',Math.round(M.dayPortions));
  set('tot_rev',fmt(M.dayRev));
  set('tot_rec','ø '+Math.round(recSum/Math.max(M.dayPortions,1))+' ₽');
  set('tot_avgcheck','ø '+Math.round(M.avgCheck)+' ₽');
  set('tot_margin','ø +'+Math.round(M.avgCheck-M.avgCogs)+' ₽');
  set('tot_fcp',M.avgCheck>0?Math.round(M.avgCogs/M.avgCheck*100)+'%':'—');
  set('tot_gm',M.avgCheck>0?Math.round((M.avgCheck-M.avgCogs)/M.avgCheck*100)+'%':'—');
  set('tot_net','ø +'+Math.round(netDay/Math.max(M.dayPortions,1))+' ₽');

  // KPI
  const e=document.getElementById('kpi_ebitda');
  if(e){ e.textContent=fmt(M.ebitda); e.className='kpi-num '+(M.ebitda>=0?'kpi-ok':'kpi-bad'); }
  set('kpi_ebitda_pct',(M.ebitdaPct>0?'+':'')+M.ebitdaPct.toFixed(0)+'% от выручки нетто');
  const be=document.getElementById('kpi_be');
  if(be){ be.textContent=M.beDaily>0?M.beDaily:'—'; be.className='kpi-num '+(M.beDaily>0&&M.dayPortions>=M.beDaily?'kpi-ok':'kpi-bad'); }
  const target=document.getElementById('kpi_target');
  if(target){ target.textContent=M.targetDaily>0?M.targetDaily:'—'; target.className='kpi-num '+(M.targetDaily<=S.capacity?'kpi-ok':'kpi-bad'); }
  set('kpi_target_note',fmt(S.targetProfit)+' EBITDA/мес');
  set('kpi_check',Math.round(M.avgCheck)+' ₽');
  const fc=document.getElementById('kpi_fc');
  if(fc){ fc.textContent=M.foodCostPct.toFixed(0)+'%'; fc.className='kpi-num '+(M.foodCostPct<=S.targetFc?'kpi-ok':M.foodCostPct<=35?'':'kpi-bad'); }

  // Capacity and market
  const capPct=M.dayPortions/Math.max(S.capacity,1)*100;
  const targetCapPct=M.targetDaily/Math.max(S.capacity,1)*100;
  set('cap_used',capPct.toFixed(1)+'%');
  set('cap_hint',`${Math.round(M.dayPortions)} из ${S.capacity} блюд/день сейчас. Для цели: ${M.targetDaily} блюд/день (${targetCapPct.toFixed(1)}% мощности).`);
  const capBar=document.getElementById('cap_bar');
  if(capBar){ capBar.style.width=Math.min(100,capPct).toFixed(1)+'%'; capBar.style.background=capPct>100?'var(--red)':capPct>80?'var(--amber)':'var(--lime)'; }
  set('market_day',Math.round(MM.portionsDay).toLocaleString('ru')+' / день');
  set('market_hint',`ЦА ~${Math.round(MM.buyers).toLocaleString('ru')} чел., рынок ~${fmtK(MM.revMonth)}/мес. ${S.market.capturePct}% доли = ${Math.round(MM.captureDay)} порций/день.`);
  const possibleByCap=M.targetDaily<=S.capacity;
  const possibleByMarket=M.targetDaily<=MM.captureDay || M.beDaily<=MM.captureDay;
  const status=possibleByCap?(possibleByMarket?'реально':'нужен спрос'):'упрёмся';
  const rs=document.getElementById('real_status');
  if(rs){ rs.textContent=status; rs.style.color=possibleByCap&&possibleByMarket?'var(--green)':possibleByCap?'var(--amber)':'var(--red)'; }
  set('real_hint', possibleByCap
    ? `Кухня выдерживает цель. Проверь, можешь ли забрать ${Math.max(M.targetDaily,M.beDaily)} порций/день: это ${(Math.max(M.targetDaily,M.beDaily)/Math.max(MM.portionsDay,1)*100).toFixed(2)}% оценочного рынка.`
    : `Цель требует ${M.targetDaily} порций/день, выше текущей мощности ${S.capacity}. Нужна сменность, заготовки или вторая точка.`);

  // P&L waterfall
  const rows=[
    {name:'Выручка (gross)',val:M.revGross,bold:true},
    {name:'— Комиссии каналов ('+(M.wtdComm*100).toFixed(1)+'%)',val:-M.commLoss},
    {name:'Выручка нетто',val:M.revNet,bold:true},
    {name:'— COGS (ингредиенты + упаковка)',val:-M.cogsTotal},
    {name:'Валовая прибыль (GP '+M.gpPct.toFixed(0)+'%)',val:M.gp,bold:true},
    {name:'— ФОТ с налогами',val:-M.fot},
    {name:'— Аренда + коммуналка',val:-(S.fix.rent+S.fix.util)},
    {name:'— Маркетинг + прочее',val:-(S.fix.mkt+S.fix.other)},
    {name:'EBITDA ('+M.ebitdaPct.toFixed(0)+'%)',val:M.ebitda,bold:true,total:true},
  ];
  document.getElementById('pl_waterfall').innerHTML=rows.map(r=>{
    const color=r.total?(r.val>=0?'var(--green)':'var(--red)'):r.val<0?'var(--red)':'var(--white)';
    return `<div class="${r.total?'pl-row pl-total':'pl-row'}">
      <span class="${r.bold?'pl-name strong':'pl-name'}">${r.name}</span>
      <span class="pl-amount" style="color:${color};">${fmt(r.val)}</span>
    </div>`;
  }).join('');

  // Cost structure
  const items=[
    {name:'COGS · продукты + упаковка',val:M.cogsTotal,color:'#B5D64E'},
    {name:'Комиссии каналов',val:M.commLoss,color:'#EF4444'},
    {name:'ФОТ с налогами',val:M.fot,color:'rgba(255,255,255,.55)'},
    {name:'Аренда',val:S.fix.rent,color:'#3B82F6'},
    {name:'Коммуналка',val:S.fix.util,color:'rgba(255,255,255,.32)'},
    {name:'Маркетинг',val:S.fix.mkt,color:'#F59E0B'},
    {name:'Прочее',val:S.fix.other,color:'rgba(255,255,255,.18)'},
  ].sort((a,b)=>b.val-a.val);
  const maxV=Math.max(...items.map(i=>i.val),1);
  document.getElementById('cost_structure').innerHTML=items.map(i=>{
    const pct=M.revGross>0?i.val/M.revGross*100:0;
    return `<div class="cs-row">
      <div class="cs-name">${i.name}</div>
      <div class="cs-bar-outer"><div class="cs-bar" style="width:${Math.max(2,i.val/maxV*100)}%;background:${i.color};"></div></div>
      <div class="cs-amt">${fmtK(i.val)}</div>
      <div class="cs-pct">${pct.toFixed(1)}%</div>
    </div>`;
  }).join('');
  const top3=items.slice(0,3).map(i=>i.name.split(' ·')[0]).join(', ');
  document.getElementById('cs_insight').innerHTML=`Топ-3 статьи: <strong>${top3}</strong> — ${(items.slice(0,3).reduce((s,i)=>s+i.val,0)/Math.max(M.revGross,1)*100).toFixed(0)}% выручки. Остальное (${fmtK(M.ebitda)}) — EBITDA ${M.ebitdaPct.toFixed(0)}%.`;

  // Sensitivity
  const base=M.ebitda;
  const sens=[
    {name:'+10 порций/день',hint:'рост объёма при том же миксе',m:computeModel({extraQty:10})},
    {name:'Доля DTC +10 п.п. вместо Яндекса',hint:'перевод трафика в свой канал',m:(()=>{const s1=S.dtcShare,s2=S.yaShare;S.dtcShare=Math.min(80,s1+10);S.yaShare=Math.max(0,s2-10);const r=computeModel();S.dtcShare=s1;S.yaShare=s2;return r;})()},
    {name:'Комиссия Яндекса −5 п.п.',hint:'переговоры / смена тарифа',m:computeModel({yaComm:Math.max(0,S.ya-5)})},
    {name:'Себестоимость −10%',hint:'закупки, сезонность, ТТК',m:computeModel({fcScale:0.9})},
    {name:'ФОТ −10%',hint:'график смен, аутсорс',m:computeModel({fotScale:0.9})},
    {name:'Аренда −20%',hint:'помещение дальше от центра',m:computeModel({rentScale:0.8})},
    {name:'Цены +5% (все РРЦ)',hint:'проверка эластичности',m:(()=>{const ov={...S.over};DISHES.forEach(d=>{S.over[d.id]=Math.round(priceOf(d)*1.05);});const r=computeModel();S.over=ov;return r;})()},
  ].map(s=>({...s,delta:s.m.ebitda-base})).sort((a,b)=>b.delta-a.delta);
  document.getElementById('sens_grid').innerHTML=sens.map(s=>`
    <div class="sens-row">
      <div class="sens-name">${s.name}<small>${s.hint}</small></div>
      <div class="sens-val" style="color:${s.delta>=0?'var(--green)':'var(--red)'};">${s.delta>=0?'+':''}${fmtK(s.delta)}/мес</div>
    </div>`).join('');

  // Scenarios
  const scales=[0.5,0.75,1,1.25,1.5,2,3];
  document.getElementById('sc_table').innerHTML=`
    <thead><tr><th>Сценарий</th><th>Порций/день</th><th>Загрузка кухни</th><th>Доля рынка</th><th>Выручка gross</th><th>Выручка нетто</th><th>GP</th><th>EBITDA</th><th>EBITDA %</th></tr></thead>
    <tbody>${scales.map(sc=>{
      const m=computeModel({qtyScale:sc});
      const cap=m.dayPortions/Math.max(S.capacity,1)*100;
      const share=m.dayPortions/Math.max(MM.portionsDay,1)*100;
      return `<tr class="${sc===1?'now':''}">
        <td>${sc===1?'Текущий план':'×'+sc}</td>
        <td>${Math.round(m.dayPortions)}</td>
        <td style="color:${cap<=80?'var(--green)':cap<=100?'var(--amber)':'var(--red)'};">${cap.toFixed(1)}%</td>
        <td>${share.toFixed(2)}%</td>
        <td>${fmtK(m.revGross)}</td>
        <td>${fmtK(m.revNet)}</td>
        <td>${fmtK(m.gp)}</td>
        <td style="color:${m.ebitda>=0?'var(--green)':'var(--red)'};">${m.ebitda>=0?'+':''}${fmtK(m.ebitda)}</td>
        <td style="color:${m.ebitda>=0?'var(--green)':'var(--red)'};">${m.ebitdaPct.toFixed(0)}%</td>
      </tr>`;}).join('')}</tbody>`;

  // Category breakdown
  const catAgg={};
  DISHES.forEach(d=>{
    const q=S.qty[d.id]||0, p=priceOf(d), c=cogsOf(d);
    if(!catAgg[d.cat]) catAgg[d.cat]={qty:0,rev:0,cogs:0};
    catAgg[d.cat].qty+=q; catAgg[d.cat].rev+=q*p; catAgg[d.cat].cogs+=q*c;
  });
  document.getElementById('cat_table').innerHTML=`
    <thead><tr><th>Категория</th><th>Порций/день</th><th>Выручка/день</th><th>COGS/день</th><th>Маржа/день</th><th>Маржа %</th></tr></thead>
    <tbody>${CAT_LIST.filter(c=>catAgg[c]&&catAgg[c].qty>0).map(c=>{
      const a=catAgg[c], mg=a.rev-a.cogs, mgp=a.rev>0?mg/a.rev*100:0;
      const label=c==='Второе'?'Вторые блюда':c==='Суп'?'Супы':c==='Салат'?'Салаты':c==='Гарнир'?'Гарниры':c==='Десерт'?'Десерты':c==='Напиток'?'Напитки':'Добавки';
      return `<tr><td>${label}</td><td>${a.qty}</td><td>${fmt(a.rev)}</td><td>${fmt(a.cogs)}</td><td style="color:var(--green);">+${fmt(mg)}</td><td>${mgp.toFixed(0)}%</td></tr>`;}).join('')}</tbody>`;

  saveState();
}

function unlock(){
  document.getElementById('lock').style.display='none';
  const root=document.getElementById('vc-root');
  root.style.display='block';
  if(!root.dataset.built){ root.dataset.built='1'; S=loadState(); buildUI(); calc(); }
}
if(sessionStorage.getItem('_vcu')==='ok'){ unlock(); }
else{ setTimeout(()=>document.getElementById('vc-pass').focus(),200); }
</script>
<script>
function updateThemeIcon(){var isLight=document.documentElement.getAttribute('data-theme')==='light';var s=document.getElementById('ttIconSun'),m=document.getElementById('ttIconMoon');if(s&&m){s.style.display=isLight?'block':'none';m.style.display=isLight?'none':'block';}}
function toggleTheme(){var h=document.documentElement;if(h.getAttribute('data-theme')==='light'){h.removeAttribute('data-theme');localStorage.setItem('bodro-theme','dark');}else{h.setAttribute('data-theme','light');localStorage.setItem('bodro-theme','light');}updateThemeIcon();}
updateThemeIcon();
</script>
